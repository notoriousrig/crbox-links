server {
    listen 80;
    server_name _;
    root /usr/share/nginx/html;
    index index.html;

    # Favicon uploads can be up to 512KB; bookmark imports up to ~5MB
    client_max_body_size 10M;

    location /api/ {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        # CRITICAL: forward CF Access JWT so the backend can verify it
        proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
        proxy_read_timeout 120s;
    }

    # Bulk favicon warm-cache can take several minutes with ~2k bookmarks
    location = /api/favicons/warm-cache {
        proxy_pass http://backend:8000;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Cf-Access-Jwt-Assertion $http_cf_access_jwt_assertion;
        proxy_read_timeout 900s;
        proxy_send_timeout 900s;
    }

    # Vite hashes asset filenames — cache them forever
    location /assets/ {
        expires 1y;
        add_header Cache-Control "public, max-age=31536000, immutable";
    }

    # Service worker / manifest must not be cached (so PWA updates work)
    location = /service-worker.js {
        add_header Cache-Control "no-store, must-revalidate";
        expires 0;
    }
    location = /manifest.webmanifest {
        add_header Cache-Control "no-store, must-revalidate";
        expires 0;
    }

    location / {
        try_files $uri $uri/ /index.html;
        add_header Cache-Control "no-store, must-revalidate";
        expires 0;
    }
}
